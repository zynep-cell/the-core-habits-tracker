<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Core Zen | Habit Tracker</title>
    <!-- Lüks serif ve sans-serif fontlar (Shibumi estetiği) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --surface: #1a1a1a;
            --surface-hover: #262626;
            --text-main: #e0e0e0;
            --text-muted: #808080;
            --accent: #d4af37; /* Altın/Bronz nötr ton */
            --border: #333333;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* 1. NETLEŞEN VİZYON */
        .vision-container {
            width: 100%;
            max-width: 600px;
            height: 300px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }

        #vision-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Başlangıç filtreleri - JS tarafından dinamik ezilecek */
            filter: grayscale(100%) blur(10px);
            transition: var(--transition);
        }

        .vision-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .vision-title {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .streak-counter {
            font-size: 0.85rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .upload-btn-container {
            position: absolute;
            top: 1rem;
            right: 1rem;
            opacity: 0.3;
            transition: var(--transition);
        }
        
        .vision-container:hover .upload-btn-container { opacity: 1; }

        input[type="file"] { display: none; }
        .upload-label {
            background: rgba(0,0,0,0.6);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid var(--border);
            backdrop-filter: blur(4px);
        }

        /* 2. ZENGİN MEDYALI ALIŞKANLIK KARTLARI */
        .tracker-board {
            width: 100%;
            max-width: 600px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .add-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.5rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .add-btn:hover {
            background: var(--accent);
            color: #000;
        }

        .progress-text { font-family: var(--font-serif); color: var(--text-muted); }

        .habit-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
            transition: var(--transition);
        }

        .habit-header {
            padding: 1.2rem;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .habit-header:hover { background: var(--surface-hover); }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 1px solid var(--text-muted);
            border-radius: 50%;
            margin-right: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .habit-item.done .checkbox {
            background: var(--accent);
            border-color: var(--accent);
        }

        .checkbox::after {
            content: '✓';
            color: #000;
            font-size: 14px;
            opacity: 0;
            transition: var(--transition);
        }

        .habit-item.done .checkbox::after { opacity: 1; }

        .habit-title {
            flex-grow: 1;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .habit-item.done .habit-title {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .habit-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            margin-left: 0.8rem;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .habit-actions button:hover { color: var(--text-main); }

        .habit-details {
            max-height: 0;
            overflow: hidden;
            background: #111;
            transition: max-height 0.5s ease;
        }

        .habit-details.open { max-height: 500px; /* Medya yüksekliğine göre açılır */ }

        .details-content {
            padding: 1.2rem;
            border-top: 1px dashed var(--border);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Modal (Ekle/Düzenle) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            z-index: 100;
        }

        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal {
            background: var(--surface);
            padding: 2rem;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--border);
        }

        .modal input, .modal textarea {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            font-family: var(--font-sans);
        }

        .modal textarea { min-height: 120px; resize: vertical; }

        .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; }
        
        .btn-cancel { background: transparent; border: none; color: var(--text-muted); cursor: pointer; }
        .btn-save { background: var(--text-main); color: #000; border: none; padding: 0.5rem 1.5rem; border-radius: 4px; cursor: pointer; font-weight: 600; }

    </style>
</head>
<body>

    <!-- VİZYON ALANI -->
    <div class="vision-container">
        <img id="vision-image" src="" alt="Vizyon Fotoğrafı">
        <div class="upload-btn-container">
            <label for="vision-upload" class="upload-label">Fotoğraf Değiştir</label>
            <input type="file" id="vision-upload" accept="image/*">
        </div>
        <div class="vision-overlay">
            <div class="vision-title">The Core Zen</div>
            <div class="streak-counter" id="streak-display">0.6 İcraat Döngüsü: 0 Gün</div>
        </div>
    </div>

    <!-- ALIŞKANLIK KONTROL PANELİ -->
    <div class="tracker-board">
        <div class="controls">
            <div class="progress-text" id="progress-text">Netlik: %0</div>
            <button class="add-btn" onclick="openModal()">+ Yeni Odak Ekle</button>
        </div>
        <div id="habits-container">
            <!-- JS tarafından doldurulacak -->
        </div>
    </div>

    <!-- MODAL (EKLE / DÜZENLE) -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 style="margin-bottom: 1.5rem; font-family: var(--font-serif); font-weight: 400;">Odak Düzenle</h3>
            <input type="hidden" id="habit-id">
            <input type="text" id="habit-title" placeholder="Alışkanlık Adı (örn: Lenf Masajı)">
            <textarea id="habit-details" placeholder="Medya veya Notlar (HTML destekler. Örn: <img src='link' style='width:100%'>)"></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">İptal</button>
                <button class="btn-save" onclick="saveHabit()">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. VERİ YAPISI VE INITIALIZATION ---
        // LocalStorage'dan verileri çek veya varsayılanları yükle
        let habits = JSON.parse(localStorage.getItem('coreZenHabits')) || [
            { id: Date.now(), title: 'Lenf Masajı', details: 'Sabah rutini. Boyun ve köprücük kemiği bölgelerine hafif vuruşlar.', done: false },
            { id: Date.now() + 1, title: 'Ayak Bakımı', details: 'Ponza ve nemlendirici uygulaması.', done: false }
        ];
        
        let streak = parseInt(localStorage.getItem('coreZenStreak')) || 0;
        let lastCompletedDate = localStorage.getItem('coreZenLastDate') || '';
        let visionDataUrl = localStorage.getItem('coreZenVision') || 'https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?q=80&w=1000&auto=format&fit=crop'; // Minimalist varsayılan görsel

        document.getElementById('vision-image').src = visionDataUrl;

        // --- 2. GÜNLÜK SIFIRLAMA KONTROLÜ ---
        function checkDailyReset() {
            const today = new Date().toLocaleDateString();
            const storedDate = localStorage.getItem('coreZenCurrentDate');
            
            if (storedDate !== today) {
                // Yeni gün gelmiş, tüm alışkanlıkları sıfırla
                habits.forEach(h => h.done = false);
                localStorage.setItem('coreZenCurrentDate', today);
                saveData();
            }
        }

        // --- 3. ANA RENDER FONKSİYONLARI ---
        function render() {
            const container = document.getElementById('habits-container');
            container.innerHTML = '';
            
            let completedCount = 0;

            habits.forEach(habit => {
                if(habit.done) completedCount++;

                const item = document.createElement('div');
                item.className = `habit-item ${habit.done ? 'done' : ''}`;
                
                // HTML structure for card
                item.innerHTML = `
                    <div class="habit-header" onclick="toggleDetails(${habit.id})">
                        <div class="checkbox" onclick="event.stopPropagation(); toggleDone(${habit.id})"></div>
                        <div class="habit-title">${habit.title}</div>
                        <div class="habit-actions">
                            <button onclick="event.stopPropagation(); editHabit(${habit.id})">Düzenle</button>
                            <button onclick="event.stopPropagation(); deleteHabit(${habit.id})">Sil</button>
                        </div>
                    </div>
                    <div class="habit-details" id="details-${habit.id}">
                        <div class="details-content">${habit.details}</div>
                    </div>
                `;
                container.appendChild(item);
            });

            updateVisionLogic(completedCount, habits.length);
        }

        // --- 4. VİZYON VE STREAK ALGORİTMASI ---
        function updateVisionLogic(completed, total) {
            const img = document.getElementById('vision-image');
            const progressText = document.getElementById('progress-text');
            const streakDisplay = document.getElementById('streak-display');
            
            let percentage = total === 0 ? 0 : (completed / total);
            
            // Kural: 0 done = %100 grayscale, 10px blur. 100% done = %0 grayscale, 0px blur.
            const grayValue = 100 - (percentage * 100);
            const blurValue = 10 - (percentage * 10);
            
            img.style.filter = `grayscale(${grayValue}%) blur(${blurValue}px)`;
            progressText.innerText = `Netlik: %${Math.round(percentage * 100)}`;

            // Streak Mantığı
            const today = new Date().toLocaleDateString();
            if (percentage === 1 && total > 0) {
                if (lastCompletedDate !== today) {
                    streak++;
                    lastCompletedDate = today;
                    localStorage.setItem('coreZenLastDate', lastCompletedDate);
                }
            } else {
                // Eğer tiki geri alırsa ve bugün streak kazandıysa, streak'i geri al
                if (lastCompletedDate === today) {
                    streak = Math.max(0, streak - 1);
                    lastCompletedDate = '';
                    localStorage.removeItem('coreZenLastDate');
                }
            }
            
            localStorage.setItem('coreZenStreak', streak);
            streakDisplay.innerText = `0.6 İcraat Döngüsü: ${streak} Gün`;
        }

        // --- 5. ETKİLEŞİMLER (CRUD) ---
        function toggleDone(id) {
            const habit = habits.find(h => h.id === id);
            if(habit) {
                habit.done = !habit.done;
                saveData();
                render();
            }
        }

        function toggleDetails(id) {
            const detailsDiv = document.getElementById(`details-${id}`);
            detailsDiv.classList.toggle('open');
        }

        function deleteHabit(id) {
            if(confirm('Bu alışkanlığı silmek istediğine emin misin?')) {
                habits = habits.filter(h => h.id !== id);
                saveData();
                render();
            }
        }

        // --- 6. MODAL YÖNETİMİ ---
        const modal = document.getElementById('modal');
        const idInput = document.getElementById('habit-id');
        const titleInput = document.getElementById('habit-title');
        const detailsInput = document.getElementById('habit-details');

        function openModal() {
            idInput.value = '';
            titleInput.value = '';
            detailsInput.value = '';
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function editHabit(id) {
            const habit = habits.find(h => h.id === id);
            if(habit) {
                idInput.value = habit.id;
                titleInput.value = habit.title;
                detailsInput.value = habit.details;
                modal.classList.add('active');
            }
        }

        function saveHabit() {
            const id = idInput.value;
            const title = titleInput.value.trim();
            const details = detailsInput.value.trim();

            if(!title) return alert('Lütfen bir başlık girin.');

            if(id) {
                // Güncelle
                const habit = habits.find(h => h.id === parseInt(id));
                habit.title = title;
                habit.details = details;
            } else {
                // Yeni Ekle
                habits.push({
                    id: Date.now(),
                    title: title,
                    details: details,
                    done: false
                });
            }

            saveData();
            closeModal();
            render();
        }

        // --- 7. FOTOĞRAF YÜKLEME ---
        document.getElementById('vision-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    visionDataUrl = event.target.result;
                    document.getElementById('vision-image').src = visionDataUrl;
                    try {
                        localStorage.setItem('coreZenVision', visionDataUrl);
                    } catch (error) {
                        alert('Dosya boyutu çok büyük. Lütfen LocalStorage limitlerini aşmamak için daha küçük boyutlu bir fotoğraf seçin.');
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        // Yardımcı Kaydetme Fonksiyonu
        function saveData() {
            localStorage.setItem('coreZenHabits', JSON.stringify(habits));
        }

        // Başlangıç tetiklemeleri
        checkDailyReset();
        render();

    </script>
</body>
</html>
